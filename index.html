<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>To-Do List</h1>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Your task here">
            <button id="addButton">Add</button>
        </div>

        <ul id="taskList"></ul>
    </div>

    <div class="image">
        <img src="https://www.google.com/imgres?q=mountains%20creative%20commons&imgurl=https%3A%2F%2Fupload.wikimedia.org%2Fwikipedia%2Fcommons%2Fc%2Fc2%2FGlorious-blue-mountain-range.jpg%3Futm_source%3Dcommons.wikimedia.org%26utm_campaign%3Dindex%26utm_content%3Doriginal&imgrefurl=https%3A%2F%2Fcommons.wikimedia.org%2Fwiki%2FFile%3AGlorious-blue-mountain-range.jpg&docid=hl5KW2Wgx5ZvMM&tbnid=3Vdtg5Jg0CDzlM&vet=12ahUKEwiI2v-f6tWUAxVKLUQIHTbmE5wQnPAOegQIGBAB..i&w=1920&h=1200&hcb=2&ved=2ahUKEwiI2v-f6tWUAxVKLUQIHTbmE5wQnPAOegQIGBAB" alt="Mountainous Landscape">
    <script src="script.js"></script>
</body>
</html>
